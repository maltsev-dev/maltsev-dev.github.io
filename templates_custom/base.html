<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description if page and page.description else site.title + ' - Technical blog about embedded systems, Rust, and engineering' }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:type" content="{% if page %}article{% else %}website{% endif %}">
    <meta property="og:title" content="{% if page %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:url" content="{{ site.base_url }}/{% if current_path %}{{ current_path }}{% endif %}">
    <meta property="og:image" content="https://github.com/maltsev-dev/favicon.png">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="shortcut icon" type="image/png" href="/static/favicon.png">

    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="constellation-container">
        <canvas id="constellation-canvas"></canvas>
    </div>
    <div class="site-wrapper">
        {% include "components/header.html" %}

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        {% include "components/footer.html" %}
    </div>

    <button class="theme-toggle" aria-label="Toggle dark mode" id="themeToggle">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <script src="/static/js/theme.js"></script>
    <script src="/static/js/constellation.js"></script>
    <script src="/static/js/fade-in.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
