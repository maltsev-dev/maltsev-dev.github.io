<header class="header">

            <div class="logo">
                <span class="logo-text">{{ site.logo_text }}</span>
            </div>
        </a>

        <nav class="main-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="/" class="nav-link {% if current_path == '' %}active{% endif %}">Home</a>
                </li>
                <li class="nav-item">
                    <a href="/archive/" class="nav-link {% if current_path == 'archive' %}active{% endif %}">Blog</a>
                </li>
                <li class="nav-item">
                    <a href="/projects/" class="nav-link {% if current_path == 'projects' %}active{% endif %}">AI Solutions</a>
                </li>
                <li class="nav-item">
                    <a href="/about/" class="nav-link {% if current_path == 'about' %}active{% endif %}">About</a>
                </li>
            </ul>
        </nav>

        <button class="mobile-menu-toggle" aria-label="Toggle menu" id="mobileMenuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>
