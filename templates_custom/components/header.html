<header class="header">
    <div class="container header-inner">
        <a href="/" class="logo-link">
            <div class="logo">
                <span class="logo-text">{{ site.logo_text }}</span>
            </div>
        </a>

        <nav class="main-nav">
            <ul class="nav-list">

                <li class="nav-item">
                    <a href="/" class="nav-link 
                    {% if current_path == '/' or current_path == '' %}active{% endif %}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a href="/projects/" class="nav-link 
                    {% if current_path and current_path.startswith('/projects') %}active{% endif %}">
                        AI Projects
                    </a>
                </li>

                <li class="nav-item">
                    <a href="/about/" class="nav-link 
                    {% if current_path and current_path.startswith('/about') %}active{% endif %}">
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a href="/archive/" class="nav-link 
                    {% if current_path and current_path.startswith('/archive') %}active{% endif %}">
                        Blog
                    </a>
                </li>

            </ul>
        </nav>

        <button class="mobile-menu-toggle" aria-label="Toggle menu" id="mobileMenuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>
