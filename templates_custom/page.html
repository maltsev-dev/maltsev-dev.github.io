{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ site.title }}{% endblock %}

{% block content %}
<div class="container">
    <article class="page-content">
        <header class="page-header">
            <h1 class="page-title">{{ page.title }}</h1>
        </header>
        
        <div class="page-body">
            {{ content | safe }}
        </div>
    </article>
</div>
{% endblock %}
