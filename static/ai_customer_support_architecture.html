<script>
  // Sync theme with parent on load
  (function() {
    try {
      const parentDoc = window.parent.document;
      const parentTheme = parentDoc.documentElement.getAttribute('data-theme');
      if (parentTheme) {
        document.documentElement.setAttribute('data-theme', parentTheme);
      }
    } catch(e) {}
  })();
  
  // Listen for theme changes via postMessage
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'theme-change' && e.data.theme) {
      document.documentElement.setAttribute('data-theme', e.data.theme);
    }
  });
</script>

<script>
// Tooltip functionality
document.addEventListener('DOMContentLoaded', function() {
  const tooltip = document.getElementById('tooltip');
  const tooltipTitle = document.getElementById('tooltip-title');
  const tooltipDesc = document.getElementById('tooltip-desc');
  const interactiveGroups = document.querySelectorAll('.interactive-group');
  
  interactiveGroups.forEach(group => {
    group.addEventListener('mouseenter', function(e) {
      const title = this.getAttribute('data-title');
      const desc = this.getAttribute('data-desc');
      
      tooltipTitle.textContent = title;
      tooltipDesc.textContent = desc;
      tooltip.classList.add('visible');
      
      // Position tooltip near cursor
      updateTooltipPosition(e);
    });
    
    group.addEventListener('mousemove', function(e) {
      updateTooltipPosition(e);
    });
    
    group.addEventListener('mouseleave', function() {
      tooltip.classList.remove('visible');
    });
  });
  
  function updateTooltipPosition(e) {
    const padding = 15;
    const tooltipRect = tooltip.getBoundingClientRect();
    let x = e.clientX + padding;
    let y = e.clientY + padding;
    
    // Adjust if tooltip goes off right edge
    if (x + tooltipRect.width > window.innerWidth) {
      x = e.clientX - tooltipRect.width - padding;
    }
    
    // Adjust if tooltip goes off bottom edge
    if (y + tooltipRect.height > window.innerHeight) {
      y = e.clientY - tooltipRect.height - padding;
    }
    
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
});
</script>
