<!DOCTYPE html>

<title>AI Support Ticket Architecture</title>
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #1a1a18;
    --text-secondary: #5f5e5a;
    --border-color: #b4b2a9;
    --blue-fill: #e6f1fb; --blue-stroke: #185fa5; --blue-text: #0c447c;
    --teal-fill: #e1f5ee; --teal-stroke: #0f6e56; --teal-text: #085041;
    --purple-fill: #eeedfe; --purple-stroke: #534ab7; --purple-text: #3c3489;
    --green-fill: #eaf3de; --green-stroke: #3b6d11; --green-text: #27500a;
    --coral-fill: #faece7; --coral-stroke: #993c1d; --coral-text: #712b13;
    --amber-fill: #faeeda; --amber-stroke: #854f0b; --amber-text: #633806;
    --gray-fill: #f1efe8; --gray-stroke: #5f5e5a; --gray-text: #444441;
  }
  [data-theme="dark"] {
    --bg-color: #1a1a18;
    --text-color: #e0dfd6;
    --text-secondary: #b4b2a9;
    --border-color: #444441;
    --blue-fill: #0c447c; --blue-stroke: #85b7eb; --blue-text: #e6f1fb;
    --teal-fill: #085041; --teal-stroke: #5dcaa5; --teal-text: #e1f5ee;
    --purple-fill: #3c3489; --purple-stroke: #afa9ec; --purple-text: #eeedfe;
    --green-fill: #27500a; --green-stroke: #97c459; --green-text: #eaf3de;
    --coral-fill: #712b13; --coral-stroke: #f0997b; --coral-text: #faece7;
    --amber-fill: #633806; --amber-stroke: #ef9f27; --amber-text: #faeeda;
    --gray-fill: #444441; --gray-stroke: #b4b2a9; --gray-text: #f1efe8;
  }
  body {
    margin: 0;
    padding: 24px;
    background: var(--bg-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background-color 0.3s ease;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-color);
    margin: 0 0 20px;
    text-align: center;
    transition: color 0.3s ease;
  }
  svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; fill: var(--text-secondary); transition: fill 0.3s ease; }
  .c-blue rect { fill: var(--blue-fill); stroke: var(--blue-stroke); transition: all 0.3s ease; }
  .c-blue .th { fill: var(--blue-text); transition: fill 0.3s ease; }
  .c-teal rect { fill: var(--teal-fill); stroke: var(--teal-stroke); transition: all 0.3s ease; }
  .c-teal .th { fill: var(--teal-text); transition: fill 0.3s ease; }
  .c-purple rect { fill: var(--purple-fill); stroke: var(--purple-stroke); transition: all 0.3s ease; }
  .c-purple .th { fill: var(--purple-text); transition: fill 0.3s ease; }
  .c-green rect { fill: var(--green-fill); stroke: var(--green-stroke); transition: all 0.3s ease; }
  .c-green .th { fill: var(--green-text); transition: fill 0.3s ease; }
  .c-coral rect { fill: var(--coral-fill); stroke: var(--coral-stroke); transition: all 0.3s ease; }
  .c-coral .th { fill: var(--coral-text); transition: fill 0.3s ease; }
  .c-amber rect { fill: var(--amber-fill); stroke: var(--amber-stroke); transition: all 0.3s ease; }
  .c-amber .th { fill: var(--amber-text); transition: fill 0.3s ease; }
  .c-gray rect { fill: var(--gray-fill); stroke: var(--gray-stroke); transition: all 0.3s ease; }
  .c-gray .th { fill: var(--gray-text); transition: fill 0.3s ease; }
</style>
<script>
  function syncTheme() {
    try {
      const parentTheme = localStorage.getItem('theme');
      document.documentElement.setAttribute('data-theme', parentTheme || 'dark');
    } catch(e) {}
  }
  syncTheme();
  window.addEventListener('storage', (e) => {
    if (e.key === 'theme') syncTheme();
  });
</script>
</head>
